<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STEAK SIM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400&family=Inter:wght@400;500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
</head>

<body>

  <!-- ── HEADER ─────────────────────────────────────────── -->
  <header class="app-header">
    <div class="header-left">
      <div class="logo">STEAK SIM</div>
    </div>
    <div class="header-right">
      <span class="status-chip" id="doneness-header">RAW</span>
      <span class="status-chip" id="core-temp-header">22°C</span>
      <span class="status-chip mono" id="timer-display">0:00</span>
    </div>
  </header>

<!-- ── MAIN ──────────────────────────────────────────── -->
  <main class="app-main">

    <!-- LEFT: Pan scene & Graph -->
    <section class="panel-left">
      <div class="panel-left-col">

      <!-- Controls grid -->
      <div class="controls-grid">
        <label class="ctrl-label">
          <span>부위</span>
          <select id="cut-select">
            <option value="tenderloin">안심</option>
            <option value="strip" selected>등심</option>
            <option value="ribeye">립아이</option>
          </select>
        </label>
        <label class="ctrl-label">
          <span>팬</span>
          <select id="pan-select">
            <option value="castiron" selected>무쇠팬</option>
            <option value="stainless">스테인레스</option>
            <option value="nonstick">코팅팬</option>
          </select>
        </label>
        <label class="ctrl-label">
          <span>두께(cm)</span>
          <input type="number" id="thickness-input" value="4" min="1" max="8" step="0.5" />
        </label>
        <label class="ctrl-label">
          <span>초기온도</span>
          <select id="initial-temp-select">
            <option value="4">냉장 4°C</option>
            <option value="22" selected>실온 22°C</option>
          </select>
        </label>
      </div>

      <!-- Pan canvas -->
      <div class="pan-wrap" style="position: relative;">
        <canvas id="pan-canvas"></canvas>
        <button id="add-meat-btn" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 12px 24px; font-size: 15px; font-weight: bold; background: #1f2228; color: #fff; border: none; cursor: pointer; letter-spacing: 1px; display: none;">🥩 눌러서 고기 투입</button>
      </div>
      </div>

      <div class="panel-graph-col">
        <div class="graph-wrap">
          <div class="graph-title">프라이팬 온도</div>
          <canvas id="pan-graph-canvas"></canvas>
        </div>
        
        <div class="graph-wrap">
          <div class="graph-title">심부 온도</div>
          <canvas id="core-graph-canvas"></canvas>
        </div>
      </div>
    </section>

    <!-- RIGHT: Data panels -->
    <section class="panel-right">

      <!-- Heatmap cross-section (vertical) -->
      <div class="data-card heatmap-card">
        <div class="card-header">
          <div class="card-title">단면 온도 분포</div>
        </div>
        <div class="heatmap-wrap">
          <div class="heatmap-axis">
            <span class="heatmap-axis-label">공기면</span>
            <canvas id="heatmap-canvas"></canvas>
            <span class="heatmap-axis-label">팬면</span>
          </div>
          <div class="heatmap-colorbar">
            <span class="colorbar-label">150°C</span>
            <canvas id="colorbar-canvas" width="16" height="160"></canvas>
            <span class="colorbar-label">4°C</span>
          </div>
        </div>
        <div class="doneness-badge" style="margin-top:8px;">
          <span id="doneness-label">Raw</span>
          <span class="text-muted">–</span>
          <span id="core-temp">22°C</span>
        </div>
      </div>

      <!-- Crust gauges -->
      <div class="data-card">
        <div class="card-title">크러스트 & 수분</div>
        <div class="gauge-row">
          <span class="gauge-label">앞면</span>
          <div class="gauge-track">
            <div class="gauge-fill" id="crust-front-bar" style="width:0%"></div>
          </div>
          <span class="gauge-val" id="crust-front-val">0%</span>
        </div>
        <div class="gauge-row">
          <span class="gauge-label">뒷면</span>
          <div class="gauge-track">
            <div class="gauge-fill" id="crust-back-bar" style="width:0%"></div>
          </div>
          <span class="gauge-val" id="crust-back-val">0%</span>
        </div>
        <div class="gauge-row">
          <span class="gauge-label" style="color: #3498DB;">수분 손실</span>
          <div class="gauge-track">
            <div class="gauge-fill" id="water-fill" style="width:0%; background: #3498DB;"></div>
          </div>
          <span class="gauge-val" id="water-val" style="color: #3498DB;">0%</span>
        </div>
      </div>

      <!-- Flip count -->
      <div class="data-card data-card--row">
        <span class="text-muted">뒤집기</span>
        <span class="mono" id="flip-count">0회</span>
        <span class="text-muted">시뮬 시간</span>
        <span class="mono" id="sim-time">0s</span>
      </div>

    </section>
  </main>

  <!-- ── FOOTER ─────────────────────────────────────────── -->
  <footer class="app-footer">
    <div class="footer-fire">
      <span class="text-muted">팬</span>
      <span id="pan-temp-display" class="mono" style="margin-right: 8px;">220°C</span>
      <button class="fire-btn" data-power="100" data-label="약불">약불</button>
      <button class="fire-btn active" data-power="150" data-label="중불">중불</button>
      <button class="fire-btn" data-power="250" data-label="강불">강불</button>
      <button class="fire-btn" data-power="400" data-label="최강">최강</button>
    </div>
    <div class="footer-actions" style="display: flex; width: 100%;">
      <button class="btn-primary" id="start-btn">▶ START</button>
      <button class="btn-ghost" id="flip-btn" disabled>↩ 뒤집기</button>
      <button class="btn-ghost" id="rest-btn" disabled>☁ 레스팅</button>
      <button class="btn-ghost" id="speed-btn">속도: 3x</button>

      <div style="flex: 1;"></div>
      
      <button id="serve-btn" class="btn-primary" style="height: 40px; width: 320px; font-size: 16px; font-weight: bold; background: #000000; color: #ffffff; border: none; letter-spacing: 4px; border-radius: 4px;">SERVE</button>
    </div>
  </footer>

  <!-- ── RESULT MODAL ──────────────────────────────────────── -->
  <div id="result-modal" class="modal-overlay">
    <div class="modal-content">
      <h2 style="margin-top: 0;">스테이크 완성! 🎉</h2>
      <div id="result-summary" style="margin: 20px 0; line-height: 1.6; font-size: 15px;"></div>
      <button id="close-modal-btn" class="btn-primary" style="width: 100%; height: 48px; font-size: 16px;">다시 굽기</button>
    </div>
  </div>

  <!-- ── TOAST ─────────────────────────────────────────── -->
  <div id="toast" class="toast">알림</div>

  <!-- ── SCRIPTS ───────────────────────────────────────── -->
  <script src="js/constants.js"></script>
  <script src="js/physics.js"></script>
  <script src="js/reactions.js"></script>
  <script src="js/gemini.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
